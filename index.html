<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Priority1 — Procurement Command</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --card:#111114; --ink:#fafafa; --muted:#a1a1aa;
    --line:#27272a; --line2:#1a1a1d; --accent:#fb923c;
    --good:#22c55e; --warn:#fbbf24; --bad:#f87171;
    --hl:#1a1a1d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg)}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(14px);background:rgba(10,10,10,.78);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em;font-size:14px}
  .mark{width:26px;height:26px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;letter-spacing:-.02em}
  .crumb{color:var(--muted);font-size:13px;font-weight:500;display:none}
  .crumb b{color:var(--ink)}
  @media(min-width:640px){.crumb{display:inline}}
  .dots{display:flex;gap:5px}
  .dot{width:6px;height:6px;border-radius:999px;background:#3f3f46;transition:all .25s;cursor:pointer}
  .dot.on{width:22px;background:var(--accent)}
  .car{display:flex;flex-direction:row;width:100vw;height:100vh;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none}
  .car::-webkit-scrollbar{display:none}
  .scr{flex:0 0 100vw;width:100vw;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;padding:74px 20px 56px;overflow-y:auto;overflow-x:hidden}
  @media(min-width:768px){.scr{padding:88px 56px 72px}}
  .arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:40;width:42px;height:62px;border-radius:14px;background:rgba(24,24,27,.85);backdrop-filter:blur(8px);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;user-select:none;box-shadow:0 6px 20px rgba(0,0,0,.5);transition:all .15s;color:var(--ink)}
  .arrow:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .arrow.l{left:14px}.arrow.r{right:14px}
  .arrow svg{width:20px;height:20px}
  .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:8px;align-items:center;color:var(--muted);font-size:11px}
  .kbd{padding:2px 6px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;font-family:'JetBrains Mono',monospace;background:#18181b;color:var(--muted);font-size:11px}
  .h1{font-size:26px;font-weight:700;letter-spacing:-.025em;margin:0 0 4px}
  @media(min-width:768px){.h1{font-size:30px}}
  .sub{color:var(--muted);font-size:14px;margin:0 0 20px;max-width:720px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card-lg{padding:22px}
  .lab{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .num-xl{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
  @media(min-width:1280px){.num-xl{font-size:34px}}
  .num-lg{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .num-md{font-size:15px;font-weight:600}
  .delta-up{color:var(--bad);font-weight:600;font-size:12px}
  .delta-dn{color:var(--good);font-weight:600;font-size:12px}
  .delta-flat{color:var(--muted);font-weight:600;font-size:12px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1.4;white-space:nowrap}
  .pill-ok{background:rgba(34,197,94,.14);color:#86efac}
  .pill-warn{background:rgba(251,191,36,.16);color:#fcd34d}
  .pill-bad{background:rgba(248,113,113,.16);color:#fca5a5}
  .pill-ink{background:#fafafa;color:#0a0a0a}
  .pill-soft{background:#27272a;color:#d4d4d8}
  .pill-live{background:rgba(34,197,94,.14);color:#86efac}
  .pill-live::before{content:'';width:6px;height:6px;border-radius:999px;background:#22c55e;display:inline-block;animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .grid{display:grid;gap:14px;grid-template-columns:1fr}
  @media(min-width:768px){
    .g2{grid-template-columns:1fr 1fr}
    .g3{grid-template-columns:repeat(3,1fr)}
    .g4{grid-template-columns:repeat(4,1fr)}
    .g-2-1{grid-template-columns:2fr 1fr}
    .g-1-2{grid-template-columns:1fr 2fr}
  }
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .between-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .stack > *+*{margin-top:10px}
  .stack-lg > *+*{margin-top:18px}
  .div{height:1px;background:var(--line);margin:14px 0}
  .divide > *+*{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:13px;font-weight:500;color:var(--ink);background:#18181b;cursor:pointer;user-select:none;transition:all .12s}
  .chip:hover{border-color:#52525b}
  .chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip .x{color:var(--accent);font-weight:700}
  .chip.on .x{color:#c2410c}
  .input,.select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#18181b;color:var(--ink)}
  .input:focus,.select:focus{outline:none;border-color:var(--accent)}
  .field-lab{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block}
  .btn{padding:9px 14px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:inherit;white-space:nowrap}
  .btn-pri{background:var(--ink);color:var(--bg)}
  .btn-pri:hover{opacity:.9}
  .btn-out{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn-out:hover{border-color:var(--ink);background:#18181b}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-weight:600;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:10px 10px;border-bottom:1px solid var(--line);background:#18181b}
  td{padding:13px 10px;border-bottom:1px solid var(--line2)}
  tr:last-child td{border-bottom:0}
  tr.row-hover:hover td{background:#18181b}
  .bar{height:8px;border-radius:999px;background:#27272a;overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:999px}
  .legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0}
  .stack-h{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .stack-h::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block;flex-shrink:0}
  .source-tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);font-weight:500}
  .source-tag b{color:var(--ink);font-weight:600}
  .alert-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:#18181b}
  .alert-row.bad{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.06)}
  .alert-row.warn{border-color:rgba(251,191,36,.32);background:rgba(251,191,36,.05)}
  .alert-row.ok{border-color:rgba(34,197,94,.32);background:rgba(34,197,94,.05)}
  .spark{display:flex;align-items:flex-end;gap:1.5px;height:22px;width:60px}
  .spark > div{flex:1;border-radius:1px;min-height:1px}
  .ribbon{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:rgba(251,146,60,.10);color:#fdba74;font-size:11px;font-weight:600;border:1px solid rgba(251,146,60,.30)}
  .ribbon.good{background:rgba(34,197,94,.10);color:#86efac;border-color:rgba(34,197,94,.30)}
  .ribbon.bad{background:rgba(248,113,113,.10);color:#fca5a5;border-color:rgba(248,113,113,.30)}
  .carrier-row{display:grid;grid-template-columns:1.6fr 1.1fr 0.9fr 0.9fr 0.95fr 0.95fr 0.7fr;align-items:center;gap:14px;padding:16px 18px}
  .cr-id{display:flex;align-items:center;gap:12px;min-width:0}
  .cr-cell{min-width:0}
  .cr-lever{display:flex;justify-content:flex-end}
  @media(max-width:1100px){
    .carrier-row{grid-template-columns:1fr 1fr;gap:12px}
    .cr-lever{grid-column:1 / -1;justify-content:flex-start}
  }
  .ticker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .ticker .live-dot{width:7px;height:7px;border-radius:999px;background:#22c55e;display:inline-block;animation:pulse 1.6s infinite}
  .arriving{animation:slideIn 0.4s ease-out}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .num-tick{transition:color .25s}
  .num-tick.flash{color:var(--good)!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">P1</span>
    <span>Procurement Command</span>
    <span class="crumb">·  <b id="crumb"></b></span>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div class="car" id="car"></div>

<button class="arrow l" id="prev" aria-label="Previous">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="arrow r" id="next" aria-label="Next">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<div class="hint">
  <span class="kbd">←</span><span class="kbd">→</span>
  <span id="pageNum"></span>
</div>

<script>
/* ---------- chart defaults (dark) ---------- */
Chart.defaults.color = '#a1a1aa';
Chart.defaults.borderColor = '#27272a';
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.plugins.tooltip.backgroundColor = '#18181b';
Chart.defaults.plugins.tooltip.borderColor = '#3f3f46';
Chart.defaults.plugins.tooltip.borderWidth = 1;
Chart.defaults.plugins.tooltip.titleColor = '#fafafa';
Chart.defaults.plugins.tooltip.bodyColor = '#d4d4d8';

/* ---------- helpers ---------- */
const NOW = new Date();
const $ = (id)=>document.getElementById(id);
const fmt$ = n => '$' + (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt$0 = n => '$' + Math.round(n).toLocaleString('en-US');
const fmt$M = n => '$' + (n/1000000).toFixed(1) + 'M';
const fmt$K = n => '$' + (n/1000).toFixed(0) + 'k';
const pct = (n,p=1) => (n>=0?'+':'') + n.toFixed(p) + '%';
function ago(d){const ms=NOW-d;const m=Math.round(ms/60000);if(m<1)return'just now';if(m<60)return m+' min ago';const h=Math.round(m/60);if(h<24)return h+' hr ago';const days=Math.round(h/24);return days+'d ago';}
function fmtTime(d){return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
let SEED=83; function rnd(){SEED=(SEED*9301+49297)%233280;return SEED/233280;}
function rndInt(a,b){return Math.floor(rnd()*(b-a+1))+a;}
function pick(a){return a[rndInt(0,a.length-1)];}

/* ---------- reference data ---------- */
const CARRIERS=[
  {code:'ODFL',name:'Old Dominion',color:'#dc2626'},
  {code:'SAIA',name:'Saia',color:'#0891b2'},
  {code:'EXLA',name:'Estes Express',color:'#16a34a'},
  {code:'XPO', name:'XPO',color:'#7c3aed'},
  {code:'RLCA',name:'R+L Carriers',color:'#ea580c'},
  {code:'FXFE',name:'FedEx Freight',color:'#db2777'},
  {code:'ABFS',name:'ABF Freight',color:'#0284c7'},
];
const LANES=[
  {o:'Memphis, TN',d:'Atlanta, GA',oz:'38103',dz:'30303',mi:384},
  {o:'Chicago, IL',d:'Dallas, TX',oz:'60601',dz:'75201',mi:925},
  {o:'Los Angeles, CA',d:'Phoenix, AZ',oz:'90001',dz:'85001',mi:372},
  {o:'Atlanta, GA',d:'Charlotte, NC',oz:'30303',dz:'28202',mi:245},
  {o:'Dallas, TX',d:'Houston, TX',oz:'75201',dz:'77002',mi:239},
  {o:'Newark, NJ',d:'Boston, MA',oz:'07102',dz:'02108',mi:222},
  {o:'Houston, TX',d:'New Orleans, LA',oz:'77002',dz:'70112',mi:348},
  {o:'Cincinnati, OH',d:'Detroit, MI',oz:'45202',dz:'48226',mi:263},
  {o:'Indianapolis, IN',d:'Nashville, TN',oz:'46204',dz:'37203',mi:289},
  {o:'Kansas City, MO',d:'St. Louis, MO',oz:'64101',dz:'63101',mi:248},
];
const COORDS={
  'Memphis, TN':[-90.049,35.149],'Atlanta, GA':[-84.388,33.749],'Chicago, IL':[-87.629,41.878],
  'Dallas, TX':[-96.797,32.776],'Los Angeles, CA':[-118.243,34.052],'Phoenix, AZ':[-112.074,33.448],
  'Charlotte, NC':[-80.843,35.227],'Houston, TX':[-95.369,29.760],'Newark, NJ':[-74.172,40.735],
  'Boston, MA':[-71.058,42.360],'New Orleans, LA':[-90.071,29.951],'Cincinnati, OH':[-84.512,39.103],
  'Detroit, MI':[-83.045,42.331],'Indianapolis, IN':[-86.158,39.768],'Nashville, TN':[-86.781,36.162],
  'Kansas City, MO':[-94.578,39.099],'St. Louis, MO':[-90.199,38.627]
};
const ACCS=[
  {code:'LFTGT_DST',name:'Liftgate Destination',cost:65},
  {code:'LFTGT_ORG',name:'Liftgate Origin',cost:65},
  {code:'RES_DST',name:'Residential Delivery',cost:110},
  {code:'INSIDE_DEL',name:'Inside Delivery',cost:95},
  {code:'GUAR_NOON',name:'Guaranteed by Noon',cost:120},
  {code:'GUAR_5PM',name:'Guaranteed by 5 PM',cost:65},
  {code:'NOTIF_DEL',name:'Notification Required',cost:35},
  {code:'APPT_DEL',name:'Appointment Required',cost:45},
  {code:'LIM_ACC_CONST',name:'Limited Access · Construction',cost:85},
  {code:'HAZMAT',name:'Hazardous Material',cost:55},
];

/* Cached real public data — live keys wire later */
const EIA_DIESEL=[
  {wk:'02-09',v:3.781},{wk:'02-16',v:3.812},{wk:'02-23',v:3.854},
  {wk:'03-02',v:3.881},{wk:'03-09',v:3.844},{wk:'03-16',v:3.792},
  {wk:'03-23',v:3.768},{wk:'03-30',v:3.741},{wk:'04-06',v:3.773},
  {wk:'04-13',v:3.825},{wk:'04-20',v:3.864},{wk:'04-27',v:3.911},
];
const BLS_PPI=[
  {m:'May',v:137.4},{m:'Jun',v:137.9},{m:'Jul',v:138.6},
  {m:'Aug',v:139.1},{m:'Sep',v:139.8},{m:'Oct',v:140.2},
  {m:'Nov',v:140.5},{m:'Dec',v:141.0},{m:'Jan',v:141.4},
  {m:'Feb',v:142.0},{m:'Mar',v:142.8},{m:'Apr',v:143.4},
];

/* shipment generator — modeled on Priority1 v2 invoice/dispatch response shape */
function genShipment(idx, daysAgo){
  const lane=pick(LANES); const carrier=pick(CARRIERS);
  const weight=rndInt(450,4400);
  const cls=pick([50,55,60,65,70,77.5,85,92.5,100,125,150,175,200]);
  const linehaul=Math.round(lane.mi*(0.95+rnd()*0.55) + weight*0.18);
  const fuelPct=0.28+rnd()*0.06;
  const fuel=Math.round(linehaul*fuelPct);
  const accs=[];
  if(rnd()>0.55) accs.push(pick(ACCS));
  if(rnd()>0.85) accs.push(pick(ACCS));
  const accTotal=accs.reduce((s,a)=>s+a.cost,0);
  const total=linehaul+fuel+accTotal;
  const ts=new Date(NOW.getTime()-(daysAgo*24*60+rndInt(0,1439))*60000);
  return {id:'P1-'+(1830472+idx),pro:'999'+(10000000+idx),lane,carrier,weight,cls,linehaul,fuel,accessorials:accs,accTotal,total,ts};
}
/* 12 weeks of mock invoice data, ~22 shipments per week */
const SHIPMENTS=[];
for(let w=0; w<12; w++){
  const n = 18 + rndInt(0,8);
  for(let i=0;i<n;i++) SHIPMENTS.push(genShipment(SHIPMENTS.length, w*7 + rndInt(0,6)));
}
SHIPMENTS.sort((a,b)=>b.ts-a.ts);
/* aggregates derived from invoice shape */
const TOTAL_SPEND_12W = SHIPMENTS.reduce((s,x)=>s+x.total,0);
const MTD_SPEND = SHIPMENTS.filter(s=>s.ts>=new Date(NOW.getTime()-30*24*3600*1000)).reduce((s,x)=>s+x.total,0);
const LAST7_SPEND = SHIPMENTS.filter(s=>s.ts>=new Date(NOW.getTime()-7*24*3600*1000)).reduce((s,x)=>s+x.total,0);
const PRIOR7_SPEND = SHIPMENTS.filter(s=>{const d=NOW-s.ts;return d>=7*24*3600*1000&&d<14*24*3600*1000;}).reduce((s,x)=>s+x.total,0);
const ACCESSORIAL_LEAK = SHIPMENTS.filter(s=>s.ts>=new Date(NOW.getTime()-30*24*3600*1000)).reduce((s,x)=>s+x.accTotal,0);

const SCREENS=[];

/* ============ 1 · COMMAND CENTER ============ */
SCREENS.push({title:'Command Center', render: el => {
  /* derived from Priority1 v2 invoice endpoint shape */
  const weekBuckets=Array(12).fill(0);
  SHIPMENTS.forEach(s=>{const wk=Math.floor((NOW-s.ts)/(7*24*3600*1000));if(wk<12) weekBuckets[wk]+=s.total;});
  const weekly=weekBuckets.slice().reverse();
  const mtd=MTD_SPEND;
  const wowDelta=PRIOR7_SPEND>0?((LAST7_SPEND-PRIOR7_SPEND)/PRIOR7_SPEND)*100:0;
  const inTransit=SHIPMENTS.filter(s=>(NOW-s.ts)<48*3600*1000).length;
  const inTransitValue=SHIPMENTS.filter(s=>(NOW-s.ts)<48*3600*1000).reduce((s,x)=>s+x.total,0);
  const exceptions=SHIPMENTS.filter(s=>s.accTotal>0&&(NOW-s.ts)<7*24*3600*1000).length>>1 + 4;
  const leakMTD=ACCESSORIAL_LEAK;
  const onTime=92.4;
  const savingsMTD=Math.round(mtd*0.024);
  const spendSpark=weekly.map(v=>v||1);
  const otpSpark=[89.2,90.1,91.0,90.5,91.8,91.3,92.0,92.1,91.7,92.2,92.3,92.4];
  const leakBySpark=Array(12).fill(0);
  SHIPMENTS.forEach(s=>{const wk=Math.floor((NOW-s.ts)/(7*24*3600*1000));if(wk<12) leakBySpark[wk]+=s.accTotal;});
  const leakSpark=leakBySpark.slice().reverse().map(v=>v||1);
  const savSpark=spendSpark.map(v=>Math.round(v*0.024));
  const alerts=[
    {sev:'bad',t:'XPO running 14% above market on Memphis–Atlanta',a:'Re-tender lane'},
    {sev:'warn',t:'Cargo theft alert · Ontario, CA in last 24h',a:'Reroute or escort'},
    {sev:'warn',t:'2 invoices billed accessorials not on quote',a:'Dispute · $385'},
    {sev:'ok',t:'Diesel down 1.2% week-over-week',a:'Hold surcharge talks'},
  ];
  const sparkHTML=(arr,color)=>{const max=Math.max(...arr);return `<div class="spark">${arr.map(v=>`<div style="background:${color};opacity:${0.35+v/max*0.65};height:${(v/max*100).toFixed(0)}%;"></div>`).join('')}</div>`};
  const KPI=(lab,big,sub,spark,color)=>`
    <div class="card">
      <div class="between"><span class="lab">${lab}</span>${sparkHTML(spark,color||'#09090b')}</div>
      <div class="num-xl mono" style="margin-top:8px;">${big}</div>
      <div style="margin-top:2px;font-size:12px;color:var(--muted);font-weight:500;">${sub}</div>
    </div>`;
  el.innerHTML=`
    <div class="between" style="margin-bottom:6px;"><h1 class="h1">Command Center</h1><span class="pill pill-live">Live · ${ago(new Date(NOW.getTime()-120000))}</span></div>
    <p class="sub">Your morning briefing. Spend, performance, leverage, and what needs you today.</p>
    <div class="grid g4" style="margin-bottom:14px;">

      <div id="mapWrap" style="position:relative;width:100%;height:58vh;min-height:360px;"></div>

          <span class="row" style="gap:6px;"><span style="display:inline-block;width:18px;height:3px;background:#d4d4d8;border-radius:999px;"></span>Lane</span>

    d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us=>{
      const states=topojson.feature(us,us.objects.states);

        .attr('fill','#18181b').attr('stroke','#3f3f46').attr('stroke-width',0.7);
      svg.append('path').datum(topojson.mesh(us,us.objects.states,(a,b)=>a!==b))

      // theft hotspot blob (Ontario, CA area)
      const onp = proj([-117.65, 34.064]);

        svg.append('circle').attr('cx',onp[0]).attr('cy',onp[1]).attr('r',24).attr('fill','#dc2626').attr('opacity',0.12);
        svg.append('circle').attr('cx',onp[0]).attr('cy',onp[1]).attr('r',10).attr('fill','#dc2626').attr('opacity',0.25);
      }
      // weather blob (I-40 Memphis-Nashville)
      const wp = proj([-88.2, 35.7]);
      if(wp){
        svg.append('circle').attr('cx',wp[0]).attr('cy',wp[1]).attr('r',32).attr('fill','#0891b2').attr('opacity',0.10);
      }
      TRUCKS.forEach(t=>{
        t.op=proj(t.o); t.dp=proj(t.d);
        if(!t.op||!t.dp)return;
        const mx=(t.op[0]+t.dp[0])/2, my=(t.op[1]+t.dp[1])/2;
        const dx=t.dp[0]-t.op[0], dy=t.dp[1]-t.op[1];
        const len=Math.sqrt(dx*dx+dy*dy);
        t.cp=[mx+(-dy/len)*Math.min(60,len*0.18), my+(dx/len)*Math.min(60,len*0.18)];
      });
      const laneG=svg.append('g');
      TRUCKS.forEach(t=>{if(!t.op||!t.dp)return;

          .attr('d',`M${t.op[0]},${t.op[1]} Q${t.cp[0]},${t.cp[1]} ${t.dp[0]},${t.dp[1]}`)
          .attr('fill','none').attr('stroke',t.flag?'#f87171':'#52525b').attr('stroke-width',1).attr('stroke-dasharray','3 4').attr('opacity',t.flag?0.7:0.85);
      });
      const cityG=svg.append('g');
      const allCities=new Set(); TRUCKS.forEach(t=>{allCities.add(t.lane.o);allCities.add(t.lane.d);});
      [...allCities].forEach(c=>{
        const p=proj(COORDS[c]); if(!p)return;
        cityG.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',3.5).attr('fill','#fafafa').attr('stroke','#0a0a0a').attr('stroke-width',1.5);
        cityG.append('text').attr('x',p[0]+7).attr('y',p[1]+3).attr('font-size',10).attr('font-weight',600).attr('fill','#d4d4d8').attr('font-family','Inter').text(c.split(',')[0]);
      });
      const truckG=svg.append('g'); const labelG=svg.append('g');
      TRUCKS.forEach(t=>{
        t.tEl=truckG.append('g');
        t.tEl.append('rect').attr('width',16).attr('height',10).attr('x',-8).attr('y',-5).attr('rx',2).attr('fill',t.flag?'#dc2626':'#ea580c').attr('stroke','#fff').attr('stroke-width',1.5);
        t.lEl=labelG.append('g').style('pointer-events','none');
        const bg=t.lEl.append('rect').attr('rx',5).attr('fill','#09090b').attr('stroke','#27272a');
        const tt1=t.lEl.append('text').attr('font-size',10).attr('font-weight',700).attr('fill','#fff').attr('font-family','JetBrains Mono');
        const tt2=t.lEl.append('text').attr('font-size',9).attr('font-weight',600).attr('fill',t.flag?'#fca5a5':'#86efac').attr('font-family','JetBrains Mono');
        tt1.text(fmt$0(t.billed));
        tt2.text(t.flag?(t.flag==='theft'?'theft zone':t.flag==='late'?'late 4h':'weather'):`+${fmt$0(t.margin)} · ${t.marginPct.toFixed(0)}%`);
        const w1=tt1.node().getComputedTextLength(); const w2=tt2.node().getComputedTextLength();
        const w=Math.max(w1,w2)+12;
        bg.attr('width',w).attr('height',26).attr('x',-w/2).attr('y',-32);
        tt1.attr('text-anchor','middle').attr('y',-21);
        tt2.attr('text-anchor','middle').attr('y',-9);
      });
      function pos(t){const p=t.progress,u=1-p;
        const x=u*u*t.op[0]+2*u*p*t.cp[0]+p*p*t.dp[0];
        const y=u*u*t.op[1]+2*u*p*t.cp[1]+p*p*t.dp[1];
        const tx=2*u*(t.cp[0]-t.op[0])+2*p*(t.dp[0]-t.cp[0]);
        const ty=2*u*(t.cp[1]-t.op[1])+2*p*(t.dp[1]-t.cp[1]);
        return {x,y,ang:Math.atan2(ty,tx)*180/Math.PI};
      }
      let lastT=performance.now();
      function frame(now){const dt=now-lastT; lastT=now;
        TRUCKS.forEach(t=>{if(!t.tEl)return;
          t.progress+=t.speed*dt;
          if(t.progress>=1.05) t.progress=-0.05;
          const {x,y,ang}=pos(t);
          t.tEl.attr('transform',`translate(${x},${y}) rotate(${ang})`);
          t.lEl.attr('transform',`translate(${x},${y})`);
        });
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }).catch(()=>{wrap.innerHTML='<div class="card" style="background:#fef2f2;color:#991b1b;">Map data failed to load. Refresh.</div>';});

/* ============ 6 · QUOTE ============ */
SCREENS.push({title:'Quote', render: el => {
  const accState=ACCS.slice(0,8).map(a=>({...a,on:false}));
  let lane=LANES[0]; let weight=1240; let cls=70;
  function rates(){
    const accTotal=accState.filter(a=>a.on).reduce((s,a)=>s+a.cost,0);
    return CARRIERS.slice(0,5).map((c,i)=>{
      const base=Math.round(lane.mi*(1.0+i*0.06)+weight*0.18);
      const fuel=Math.round(base*0.31);
      return {c,base,fuel,acc:accTotal,total:base+fuel+accTotal,transit:1+i+(lane.mi>500?1:0),sid:'P1-STD-'+(i+1)};
    }).sort((a,b)=>a.total-b.total);
  }
  function paint(){
    const r=rates();
    const market=Math.round(r[0].total*1.072);
    el.querySelector('#mktBadge').textContent = `${pct(-((market-r[0].total)/market*100),1)} vs market`;
    el.querySelector('#rates').innerHTML = r.map((x,i)=>`
      <div class="card" style="${i===0?'border-color:#18181b;border-width:1.5px;':''}">
        <div class="between-top">
          <div class="row">
            <div style="width:36px;height:36px;border-radius:8px;background:${x.c.color};color:#fff;display:grid;place-items:center;font-weight:800;font-size:11px;">${x.c.code}</div>
            <div>
              <div style="font-weight:700;font-size:14px;">${x.c.name}</div>
              <div class="lab">${x.sid} · ${x.transit} day${x.transit>1?'s':''}</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div class="num-lg mono">${fmt$0(x.total)}</div>
            ${i===0?'<span class="pill pill-ink" style="margin-top:4px;">Best</span>':''}
          </div>
        </div>
        <div class="div" style="margin:14px 0 12px;"></div>
        <div class="between" style="font-size:12px;color:var(--muted);">
          <span>Linehaul <b class="mono" style="color:var(--ink);">${fmt$0(x.base)}</b></span>
          <span>Fuel <b class="mono" style="color:var(--ink);">${fmt$0(x.fuel)}</b></span>
          <span>Acc <b class="mono" style="color:var(--ink);">${fmt$0(x.acc)}</b></span>
        </div>
      </div>`).join('');
  }
  el.innerHTML=`
    <div class="between" style="margin-bottom:6px;"><h1 class="h1">Instant Quote</h1><span class="pill pill-live">POST /v2/rates · ~340ms</span></div>
    <p class="sub">Live carrier rates in under a second. Accessorial chips toggle the totals. Best rate is benchmarked against the market index.</p>
    <div class="grid g-1-2" style="align-items:start;">
      <div class="card card-lg stack-lg">
        <div>
          <span class="field-lab">Origin → Destination</span>
          <select class="select" id="laneSel"></select>
        </div>
        <div class="grid g2">
          <div><span class="field-lab">Weight (lbs)</span><input class="input mono" id="wt" value="1240" /></div>
          <div><span class="field-lab">Class</span><select class="select" id="cls"></select></div>
        </div>
        <div>
          <span class="field-lab">Accessorials</span>
          <div class="row" style="flex-wrap:wrap;gap:6px;" id="accs"></div>
        </div>
        <div class="card" style="background:#fafafa;border-style:dashed;padding:12px 14px;">
          <div class="between"><span class="lab">Best vs market</span><span class="pill pill-ok mono" id="mktBadge">-6.7%</span></div>
        </div>
      </div>
      <div class="stack" id="rates"></div>
    </div>
  `;
  el.querySelector('#laneSel').innerHTML=LANES.map((l,i)=>`<option value="${i}">${l.o} → ${l.d} · ${l.mi} mi</option>`).join('');
  el.querySelector('#cls').innerHTML=[50,55,60,65,70,77.5,85,92.5,100,125,150,175,200].map(c=>`<option ${c===cls?'selected':''}>${c}</option>`).join('');
  el.querySelector('#accs').innerHTML=accState.map((a,i)=>`<span class="chip" data-i="${i}">${a.name} <span class="x">${fmt$0(a.cost)}</span></span>`).join('');
  el.querySelectorAll('#accs .chip').forEach(c=>c.addEventListener('click',()=>{const i=+c.dataset.i;accState[i].on=!accState[i].on;c.classList.toggle('on');paint();}));
  el.querySelector('#laneSel').addEventListener('change',e=>{lane=LANES[+e.target.value];paint();});
  el.querySelector('#wt').addEventListener('input',e=>{weight=+e.target.value||1240;paint();});
  el.querySelector('#cls').addEventListener('change',e=>{cls=+e.target.value;paint();});
  paint();
}});

/* reorder so the map opens the deck */
{
  const ORDER = ['Network Map','Command Center','Spend Pulse','Carrier Power','Exception Queue','Quote','Intelligence Feed'];
  const map = Object.fromEntries(SCREENS.map(s=>[s.title,s]));
  SCREENS.length = 0;
  ORDER.forEach(t=>{ if(map[t]) SCREENS.push(map[t]); });
}

/* ---------- live ticker · pulses every visible relative timestamp ---------- */
setInterval(()=>{
  document.querySelectorAll('[data-since]').forEach(node=>{
    const t=parseInt(node.dataset.since,10);
    if(!isFinite(t))return;
    const ms=Date.now()-t;
    const m=Math.round(ms/60000);
    let txt;
    if(m<1) txt='just now';
    else if(m<60) txt=m+'m ago';
    else if(m<24*60) txt=Math.round(m/60)+'h ago';
    else txt=Math.round(m/(60*24))+'d ago';
    if(node.textContent!==txt) node.textContent=txt;
  });
  document.querySelectorAll('[data-counter]').forEach(node=>{
    const target=parseFloat(node.dataset.counter);
    const cur=parseFloat(node.dataset.current||'0');
    if(cur<target){
      const next=Math.min(target, cur+(target-cur)*0.18+1);
      node.dataset.current=next;
      node.textContent='$'+Math.round(next).toLocaleString('en-US');
    }
  });
},1500);

/* ---------- carousel ---------- */
const car=$('car'), dotsEl=$('dots');
SCREENS.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='scr'; div.id='scr'+i;
  car.appendChild(div);
  s.render(div);
  const dot=document.createElement('span'); dot.className='dot'+(i===0?' on':''); dot.dataset.i=i; dotsEl.appendChild(dot);
  dot.addEventListener('click',()=>go(i));
});
function current(){return Math.round(car.scrollLeft/window.innerWidth);}
function go(i){const n=SCREENS.length;i=((i%n)+n)%n;car.scrollTo({left:i*window.innerWidth,behavior:'smooth'});}
function paint(){
  const c=current();
  $('crumb').textContent=SCREENS[c].title;
  $('pageNum').textContent=(c+1)+' / '+SCREENS.length;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===c));
}
car.addEventListener('scroll',()=>{requestAnimationFrame(paint);});
$('prev').addEventListener('click',()=>go(current()-1));
$('next').addEventListener('click',()=>go(current()+1));
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')go(current()-1);
  else if(e.key==='ArrowRight')go(current()+1);
});
window.addEventListener('resize',()=>{const c=current();car.scrollTo({left:c*window.innerWidth,behavior:'instant'});paint();});
paint();
</script>
